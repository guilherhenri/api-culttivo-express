name: express-culttivo

services:
  express-pg:
    image: postgres:18-alpine
    container_name: express-pg
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - ${DATABASE_PORT:-5432}:5432
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U $${{DATABASE_USER} -d $${{DATABASE_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    image: redis:8.2.4-alpine
    container_name: express-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data: